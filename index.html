<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0f">
<title>Escala Oficial | Osasco Express</title>
<style>
:root{
  --bg:#f5f7fa;
  --paper:#fff;
  --ink:#101217;
  --muted:#667085;
  --line:#e6eaf0;
  --line2:#d8dee8;
  --red:#e30613;
  --green:#12944a;
  --black:#0b0c10;
  --yellow:#f5c518;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --app-width:min(100vw,980px);
  --shadow:0 16px 42px rgba(16,24,40,.10);
  --shadow2:0 8px 22px rgba(16,24,40,.06);
  --top-h:72px;
  --nav-h:74px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;min-height:100%;overflow:hidden}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 0% 0%, rgba(227,6,19,.08), transparent 24%),
    radial-gradient(circle at 100% 0%, rgba(18,148,74,.06), transparent 20%),
    linear-gradient(180deg,#fff,#f3f6fa);
}
button,input,select,textarea,a{font:inherit;-webkit-tap-highlight-color:transparent}
button{border:0;cursor:pointer}
a{color:inherit;text-decoration:none}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,a:focus-visible{
  outline:3px solid rgba(227,6,19,.22);
  outline-offset:2px;
}
.app{
  width:var(--app-width);
  height:100dvh;
  margin:0 auto;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
}
.top{
  padding:calc(8px + var(--safe-top)) 10px 8px;
  background:rgba(245,247,250,.92);
  backdrop-filter:blur(16px);
  z-index:10;
}
.topbar{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
  background:#fff;
  border:1px solid rgba(17,24,39,.06);
  box-shadow:var(--shadow2);
  border-radius:22px;
  padding:8px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{
  width:44px;height:44px;flex:0 0 44px;
  border-radius:15px;background:var(--black);
  display:grid;place-items:center;
}
.logo img{width:74%;height:74%;object-fit:contain}
.brand strong{
  display:block;
  font-size:12px;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.07em;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.brand span{
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.actions{display:flex;gap:7px;align-items:center}
.topBtn{
  height:42px;
  border-radius:15px;
  padding:0 12px;
  font-size:12px;
  font-weight:1000;
  background:#f1f3f7;
  color:var(--ink);
  white-space:nowrap;
}
.topBtn.red{background:var(--red);color:#fff;box-shadow:0 10px 20px rgba(227,6,19,.18)}
.progress{height:5px;background:#e4e9f0;border-radius:999px;margin:8px 8px 0;overflow:hidden}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),#ff5a64,var(--yellow));transition:width .2s}

.viewer{position:relative;min-height:0;overflow:hidden}
.track{height:100%;display:flex;transition:transform .3s cubic-bezier(.22,.71,.21,1)}
.slide{
  min-width:100%;
  height:100%;
  padding:8px 10px;
  display:flex;
  min-height:0;
}
.card{
  flex:1;
  min-height:0;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:28px;
  overflow:hidden;
  position:relative;
}
.scroll{
  height:100%;
  min-height:0;
  overflow:auto;
  padding:16px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.scroll::-webkit-scrollbar,.body::-webkit-scrollbar{width:8px}
.scroll::-webkit-scrollbar-thumb,.body::-webkit-scrollbar-thumb{background:#d8dee8;border-radius:999px}
.kicker{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:#fff1f2;
  border:1px solid rgba(227,6,19,.15);
  color:var(--red);
  font-size:11px;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.07em;
  max-width:100%;
}
.kicker:before{content:"";width:8px;height:8px;background:var(--red);border-radius:50%;flex:0 0 auto}
.h1{
  margin:14px 0 0;
  font-size:clamp(34px,8.5vw,58px);
  line-height:.92;
  letter-spacing:-.065em;
  text-transform:uppercase;
  max-width:760px;
}
.h2{
  margin:12px 0 0;
  font-size:clamp(28px,6.2vw,44px);
  line-height:.96;
  letter-spacing:-.055em;
  text-transform:uppercase;
  max-width:820px;
}
.redText{color:var(--red);display:block}
.lead{
  margin:10px 0 0;
  color:#344054;
  font-size:clamp(14px,2.4vw,16px);
  line-height:1.42;
  font-weight:760;
  max-width:760px;
}
.small{font-size:12px;color:var(--muted);line-height:1.35;font-weight:760}
.box{
  margin-top:14px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:22px;
  background:#fff;
  box-shadow:var(--shadow2);
}
.label{
  display:block;
  margin-bottom:7px;
  color:var(--muted);
  font-size:11px;
  font-weight:1000;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
.input,select,textarea{
  width:100%;
  min-width:0;
  border:1px solid var(--line2);
  border-radius:15px;
  background:#f8fafc;
  color:var(--ink);
  font-weight:850;
  outline:none;
}
.input,select{height:50px;padding:0 12px}
textarea{min-height:96px;padding:12px;resize:vertical;line-height:1.35}
.input:focus,select:focus,textarea:focus{border-color:rgba(227,6,19,.34);box-shadow:0 0 0 4px rgba(227,6,19,.08)}
.btn{
  min-height:46px;
  border-radius:15px;
  padding:0 14px;
  background:#111217;
  color:#fff;
  font-size:13px;
  font-weight:1000;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:nowrap;
}
.btn.red{background:var(--red)}
.btn.green{background:var(--green)}
.btn.light{background:#f1f3f7;color:var(--ink)}
.btn.danger{background:#b42318;color:#fff}
.btn.full{width:100%;margin-top:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{
  padding:8px 10px;
  border-radius:999px;
  background:#f8fafc;
  border:1px solid var(--line);
  font-size:12px;
  font-weight:900;
  color:#344054;
}
.results,.list{display:grid;gap:10px;margin-top:12px}
.result,.miniCard{
  padding:12px;
  border-radius:18px;
  background:#f8fafc;
  border:1px solid var(--line);
  overflow:hidden;
}
.result strong,.miniCard strong{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  font-size:15px;
  line-height:1.25;
}
.result p,.miniCard p{
  margin:6px 0 0;
  font-size:12px;
  line-height:1.4;
  color:#344054;
  font-weight:780;
}
.pill{
  font-size:11px;
  color:var(--red);
  background:#fff1f2;
  border:1px solid rgba(227,6,19,.15);
  padding:5px 8px;
  border-radius:999px;
  text-transform:uppercase;
  letter-spacing:.05em;
  white-space:nowrap;
  flex:0 0 auto;
}
.clientGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:14px}
.clientBtn{
  text-align:left;
  padding:14px;
  border-radius:20px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:var(--shadow2);
  min-height:82px;
}
.clientBtn strong{display:block;font-size:15px;line-height:1.25}
.clientBtn span{display:block;margin-top:4px;font-size:12px;color:var(--muted);font-weight:760;line-height:1.35}
.dayGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-top:14px}
.day{
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  background:#fff;
  box-shadow:var(--shadow2);
  min-width:0;
}
.dayHead{padding:12px;background:#101217;color:#fff}
.dayHead strong{display:block;font-size:14px;line-height:1.2}
.dayHead span{display:block;margin-top:3px;font-size:12px;color:#cbd5e1;font-weight:800}
.items{list-style:none;margin:0;padding:10px 12px 12px;display:grid;gap:8px}
.items li{
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:8px;
  font-size:13px;
  line-height:1.3;
  font-weight:850;
  align-items:flex-start;
}
.items li span:last-child{min-width:0;overflow-wrap:anywhere}
.badge{
  width:20px;height:20px;border-radius:50%;
  display:grid;place-items:center;
  font-size:11px;font-weight:1000;
  flex:0 0 auto;
}
.ok .badge{background:#dcfce7;color:#126e3d}
.open .badge{background:#fee2e2;color:#b42318}
.empty .badge{background:#eef2f7;color:#667085}
.open span:last-child{color:#b42318}
.empty span:last-child{color:#667085}
.floatConfirm{
  position:fixed;
  left:50%;
  bottom:calc(88px + var(--safe-bottom));
  transform:translateX(-50%);
  width:min(calc(100vw - 24px),760px);
  z-index:30;
  padding:0 10px;
  display:none;
  pointer-events:none;
}
.floatConfirm.show{display:block}
.floatConfirm button{pointer-events:auto}
.floatConfirm button:first-child{
  width:100%;
  min-height:54px;
  padding:0 54px 0 16px;
  border-radius:18px;
  background:linear-gradient(180deg,#13a24f,#0d843f);
  color:#fff;
  font-weight:1000;
  box-shadow:0 14px 30px rgba(18,148,74,.28);
}
.floatConfirm .x{
  position:absolute;
  right:18px;
  top:8px;
  width:38px;height:38px;
  border-radius:13px;
  background:rgba(0,0,0,.18);
  color:#fff;
}
.nav{
  padding:0 10px calc(10px + var(--safe-bottom));
  background:rgba(245,247,250,.92);
  backdrop-filter:blur(16px);
}
.navBar{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
  background:#fff;
  border:1px solid rgba(17,24,39,.06);
  box-shadow:var(--shadow2);
  border-radius:24px;
  padding:10px;
}
.navBtn{
  height:54px;
  min-width:58px;
  border-radius:17px;
  background:var(--red);
  color:#fff;
  font-size:28px;
  font-weight:1000;
}
.navBtn:disabled{opacity:.35}
.navTitle{text-align:center;min-width:0}
.navTitle strong,.navTitle span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navTitle strong{font-size:14px;font-weight:1000}
.navTitle span{font-size:11px;color:var(--muted);font-weight:800}
.sheet{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-end;
  justify-content:center;
  background:rgba(15,23,42,.34);
  backdrop-filter:blur(10px);
  z-index:70;
}
.sheet.open{display:flex}
.sheetCard{
  width:var(--w);
  max-height:90dvh;
  background:#fff;
  border-radius:28px 28px 0 0;
  border:1px solid var(--line);
  box-shadow:0 -26px 60px rgba(16,24,40,.18);
  display:flex;
  flex-direction:column;
  padding:12px 12px calc(14px + var(--safe-bottom));
  overflow:hidden;
}
.grab{width:54px;height:5px;background:#d8dee8;border-radius:999px;margin:2px auto 10px;flex:0 0 auto}
.sheetHead{flex:0 0 auto}
.sheetHead h3{margin:0;font-size:28px;letter-spacing:-.05em;line-height:1}
.sheetHead p{margin:6px 0 12px;color:var(--muted);font-size:13px;line-height:1.35;font-weight:760}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;flex:0 0 auto}
.tab{height:44px;border-radius:15px;background:#f7f8fb;border:1px solid var(--line);font-size:12px;font-weight:1000}
.tab.active{background:var(--red);border-color:var(--red);color:#fff}
.body{min-height:0;overflow:auto;padding-right:2px}
.hidden{display:none!important}
.adminBar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.adminItem{border:1px solid var(--line);border-radius:18px;padding:12px;background:#f8fafc;margin-top:10px;overflow:hidden}
.adminItem h4{margin:0 0 8px;font-size:15px}
.adminFields{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.adminList{display:grid;gap:8px;margin-top:10px}
.rowCard{
  display:grid;
  grid-template-columns:minmax(130px,1.2fr) minmax(95px,.8fr) minmax(95px,.8fr) minmax(110px,.8fr) auto auto;
  gap:6px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:16px;
  padding:8px;
  background:#fff;
}
.rowCard .btn{min-height:42px;padding:0 10px}
.toast{
  position:fixed;
  left:50%;
  top:calc(12px + var(--safe-top));
  transform:translateX(-50%);
  z-index:100;
  background:#111217;
  color:#fff;
  border-radius:999px;
  padding:11px 14px;
  font-size:13px;
  font-weight:900;
  box-shadow:var(--shadow);
  display:none;
  max-width:calc(100vw - 24px);
  text-align:center;
}
.toast.show{display:block}
@media (min-width:760px){
  .slide{padding:14px 16px}
  .scroll{padding:22px}
  .card{border-radius:34px}
  .top,.nav{padding-left:16px;padding-right:16px}
  .dayGrid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
}
@media (max-width:560px){
  .row{grid-template-columns:1fr}
  .row .btn{width:100%}
  .grid2{grid-template-columns:1fr}
  .clientGrid{grid-template-columns:1fr}
  .dayGrid{grid-template-columns:1fr}
  .actions{gap:5px}
  .topBtn{padding:0 10px}
  .rowCard{grid-template-columns:1fr}
  .rowCard .btn{width:100%}
}
@media (max-width:390px){
  .top{padding:calc(6px + var(--safe-top)) 8px 6px}
  .nav{padding:0 8px calc(8px + var(--safe-bottom))}
  .topbar,.navBar{padding:7px;border-radius:22px}
  .logo{width:42px;height:42px;flex-basis:42px}
  .brand strong{font-size:11px}
  .brand span{font-size:10px}
  .slide{padding:7px 8px}
  .card{border-radius:26px}
  .scroll{padding:14px}
  .h1{font-size:32px}
  .h2{font-size:27px}
  .lead{font-size:13px}
  .navBtn{height:50px;min-width:52px}
  .floatConfirm{bottom:calc(80px + var(--safe-bottom))}
  .tabs{gap:6px}
  .tab{font-size:11px}
}
@media (max-height:720px){
  .top{padding-top:calc(5px + var(--safe-top));padding-bottom:5px}
  .progress{margin-top:5px}
  .nav{padding-bottom:calc(6px + var(--safe-bottom))}
  .slide{padding-top:6px;padding-bottom:6px}
  .scroll{padding-top:13px;padding-bottom:13px}
}

/* UX MOTOCAS — fluxo rápido para uso parado, com polegar */
.motocaHero{display:grid;gap:12px}
.motocaSearchBox{
  margin-top:14px;padding:16px;border-radius:26px;
  border:2px solid rgba(227,6,19,.12);
  background:linear-gradient(180deg,#fff,#fff8f8);
  box-shadow:0 14px 34px rgba(227,6,19,.10);
}
.motocaSearchBox .label{color:#111217;font-size:12px}
.motocaSearchBox .row{grid-template-columns:1fr}
.motocaSearchBox .input{height:62px;border-radius:20px;font-size:18px;background:#fff}
.motocaSearchBox .btn{height:62px;border-radius:20px;font-size:16px;letter-spacing:.02em}
.fastResult{border:2px solid rgba(18,148,74,.14);background:#f3fff7}
.fastResult strong{font-size:18px}
.fastResult p{font-size:14px}
.fastResult .btn{min-height:52px;flex:1 1 140px}
.bigActionGrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.bigAction{
  min-height:64px;text-align:left;padding:14px 16px;border-radius:22px;
  background:#fff;border:1px solid var(--line);box-shadow:var(--shadow2);
  display:flex;align-items:center;gap:12px;color:var(--ink);
}
.bigActionIcon{
  width:42px;height:42px;flex:0 0 42px;border-radius:16px;
  display:grid;place-items:center;background:#fff1f2;color:var(--red);
  font-weight:1000;font-size:20px;
}
.bigAction strong{display:block;font-size:15px;line-height:1.2}
.bigAction span{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.25;font-weight:760}
.driverQuickPanel{
  display:none;position:sticky;bottom:0;z-index:6;margin-top:14px;padding:12px;
  border-radius:22px;background:#101217;color:#fff;box-shadow:0 16px 36px rgba(16,24,40,.24);
}
.driverQuickPanel.show{display:block}
.driverQuickPanel strong{display:block;font-size:17px}
.driverQuickPanel span{display:block;margin-top:3px;color:#cbd5e1;font-size:12px;font-weight:800}
.driverQuickActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.driverQuickActions button,.driverQuickActions a{
  min-height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:12px;font-weight:1000;
}
.driverQuickActions button{background:#fff;color:#111217}
.driverQuickActions a{background:var(--green);color:#fff}
.thumbConfirm{
  position:fixed;left:50%;bottom:calc(84px + var(--safe-bottom));transform:translateX(-50%);
  width:min(calc(100vw - 18px),760px);z-index:45;padding:0 8px;pointer-events:none;display:none;
}
.thumbConfirm.show{display:block}
.thumbConfirmInner{
  pointer-events:auto;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  border-radius:22px;background:#101217;color:#fff;padding:9px;box-shadow:0 18px 44px rgba(16,24,40,.28);
}
.thumbConfirmMain{
  min-height:58px;border-radius:17px;background:linear-gradient(180deg,#13a24f,#0d843f);
  color:#fff;font-weight:1000;font-size:15px;
}
.thumbConfirmClose{
  width:50px;height:58px;border-radius:17px;background:rgba(255,255,255,.12);
  color:#fff;font-size:24px;font-weight:1000;
}
.summaryCardFast{border:2px solid rgba(18,148,74,.14);background:#f3fff7}
.summaryCardFast strong{font-size:16px}
.summaryCardFast p{font-size:14px}
.compactLead{max-width:620px}
@media(min-width:760px){
  .motocaSearchBox .row{grid-template-columns:minmax(0,1fr) 180px}
  .bigActionGrid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:390px){
  .motocaSearchBox{padding:14px;border-radius:22px}
  .motocaSearchBox .input,.motocaSearchBox .btn{height:58px;border-radius:18px}
  .driverQuickActions{grid-template-columns:1fr}
  .thumbConfirm{bottom:calc(78px + var(--safe-bottom))}
}

</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
<header class="top">
  <div class="topbar">
    <div class="brand">
      <div class="logo"><img src="assets/img/logo-oe.svg" alt="Osasco Express"></div>
      <div><strong>Gibi da Escala</strong><span id="topSub">Admin · busca · confirmação</span></div>
    </div>
    <div class="actions">
      <button class="topBtn red" id="menuBtn" type="button">Menu</button>
      <button class="topBtn" id="countBtn" type="button" aria-label="Contador">1/1</button>
    </div>
  </div>
  <div class="progress"><span id="bar"></span></div>
</header>

<main class="viewer" id="swipeArea">
  <div class="track" id="track"></div>
</main>

<div class="thumbConfirm" id="thumbConfirm">
  <div class="thumbConfirmInner">
    <button class="thumbConfirmMain" id="thumbConfirmBtn" type="button">Confirmar horários</button>
    <button class="thumbConfirmClose" id="thumbConfirmClose" type="button" aria-label="Fechar confirmação">×</button>
  </div>
</div>

<footer class="nav">
  <div class="navBar">
    <button class="navBtn" id="prevBtn" type="button">‹</button>
    <div class="navTitle"><strong id="navTitle">Início</strong><span id="navSub">Buscar nome</span></div>
    <button class="navBtn" id="nextBtn" type="button">›</button>
  </div>
</footer>
</div>

<div class="sheet" id="sheet">
  <div class="sheetCard">
    <div class="grab"></div>

function itemStatus(item){ return item.status === 'open' || normalize(item.name).includes('vaga aberta') ? 'open' : 'ok'; }
function displayItem(item, client){
  if(!item) return '';
  let txt = item.name || '';
  if(item.time) txt += ' - ' + item.time;
  if(item.point && item.point !== client.point) txt += ' · ' + item.point;
  return txt;
}
function getDrivers(){
  const map = {};
  data.clients.forEach((client, cIdx)=>{
    client.days.forEach((day, dIdx)=>{
      day.items.forEach((item, iIdx)=>{
        if(itemStatus(item)==='open') return;
        const name = (item.name||'').trim();
        if(!name) return;
        if(!map[name]) map[name] = [];
        map[name].push({client, cIdx, day, dIdx, item, iIdx});
      });
    });
  });
  return map;
}
function findDrivers(q){
  const query = normalize(q);
  if(!query) return [];
  const map = getDrivers();
  return Object.keys(map).sort((a,b)=>a.localeCompare(b,'pt-BR')).filter(name=>{
    const text = name + ' ' + map[name].map(x=>`${x.client.name} ${x.day.day} ${x.day.date} ${x.item.time||''} ${x.item.point||''}`).join(' ');
    return normalize(text).includes(query);
  });
}

  const target = document.getElementById(targetId);

  if(qn) qn.textContent = selectedDriver;
  if(qt) qt.textContent = text;
  if(qs) qs.onclick = () => go(getSummaryIndex());
  if(qz) qz.href = `https://wa.me/${data.meta.whatsapp}?text=${encodeURIComponent(buildConfirmText())}`;
  if(panel) panel.classList.add('show');

  if(floatHidden){
    if(fl) fl.classList.remove('show');
  } else {
    if(fl) fl.classList.add('show');
  }
}
document.getElementById('thumbConfirmBtn').onclick = ()=>{ go(getConfirmIndex()); };
document.getElementById('thumbConfirmClose').onclick = ()=>{ floatHidden=true; localStorage.setItem('oe_float_hidden_v1','1'); updateFloat(); };

// Menu/admin
function openSheet(tab='search'){ sheet.classList.add('open'); setTab(tab); }
function closeSheet(){ sheet.classList.remove('open'); }
function setTab(tab){
  ['Search','Clients','Admin'].forEach(k=>{
    document.getElementById('tab'+k).classList.toggle('active', tab.toLowerCase()===k.toLowerCase());
    document.getElementById('body'+k).classList.toggle('hidden', tab.toLowerCase()!==k.toLowerCase());
  });
  if(tab==='admin') renderAdmin();
}
document.getElementById('menuBtn').onclick=()=>openSheet('search');
document.getElementById('countBtn').onclick=()=>openSheet('clients');
document.getElementById('closeSheet').onclick=closeSheet;
sheet.onclick=(e)=>{ if(e.target===sheet) closeSheet(); };
document.getElementById('tabSearch').onclick=()=>setTab('search');
document.getElementById('tabClients').onclick=()=>setTab('clients');
document.getElementById('tabAdmin').onclick=()=>setTab('admin');
document.getElementById('menuSearchBtn').onclick=()=>renderSearchResults('menuResults', document.getElementById('menuSearch').value);
document.getElementById('menuSearch').oninput=(e)=>renderSearchResults('menuResults', e.target.value);

function renderMenuClients(){
  const mc = document.getElementById('menuClients');
  mc.innerHTML = data.clients.map((c,i)=>`<div class="miniCard"><strong>${esc(c.name)}</strong><p>${esc(c.point)} · ${esc(c.defaultTime)}</p><button class="btn" onclick="go(${3+i});closeSheet()">Abrir escala</button></div>`).join('');
}
function renderAdmin(){
  const body = document.getElementById('bodyAdmin');
  if(!isAdmin()){ body.innerHTML = renderLogin(); bindLogin(); return; }
  body.innerHTML = renderAdminPanel();
  bindAdmin();
}
function renderLogin(){
  return `<div class="box" style="margin-top:0"><label class="label">Login</label><input class="input" id="admUser" value="admin"><label class="label" style="margin-top:8px">Senha</label><input class="input" id="admPass" type="password" placeholder="Senha"><button class="btn red full" id="admLogin">Entrar no admin</button><p class="small">Login padrão: admin · senha: 1212</p></div>`;
}
function bindLogin(){
  document.getElementById('admLogin').onclick=()=>{
    if(document.getElementById('admUser').value==='admin' && document.getElementById('admPass').value==='1212'){ localStorage.setItem(ADMIN_KEY,'1'); showToast('Admin liberado'); renderAdmin(); }
    else showToast('Login ou senha incorretos');
  };
}
function renderAdminPanel(){
  return `<div class="adminBar">
    <button class="btn green" id="admSave">Salvar</button>
    <button class="btn" id="admAddClient">Adicionar ponto</button>
    <button class="btn light" id="admExport">Exportar JSON</button>
    <button class="btn light" id="admImport">Importar JSON</button>
    <button class="btn danger" id="admReset">Resetar base</button>
    <button class="btn" id="admLogout">Sair do admin</button>
  </div>
  <div class="box"><label class="label">Semana</label><input class="input" id="admWeek" value="${esc(data.meta.weekLabel)}"><label class="label" style="margin-top:8px">WhatsApp suporte</label><input class="input" id="admZap" value="${esc(data.meta.whatsapp)}"></div>
  <div class="box"><label class="label">Selecionar ponto</label><select id="admClientSelect">${data.clients.map((c,i)=>`<option value="${i}">${esc(c.name)}</option>`).join('')}</select><div id="admClientEditor"></div></div>`;
}
function bindAdmin(){
  const saveMeta=()=>{ data.meta.weekLabel=document.getElementById('admWeek').value; data.meta.whatsapp=document.getElementById('admZap').value.replace(/\D/g,''); saveData(); render(); setTab('admin'); };
  document.getElementById('admSave').onclick=saveMeta;
  document.getElementById('admLogout').onclick=()=>{ localStorage.removeItem(ADMIN_KEY); renderAdmin(); showToast('Saiu do admin'); };
  document.getElementById('admReset').onclick=()=>{ if(confirm('Resetar para a base original?')){ data=clone(DEFAULT_DATA); saveData(); render(); setTab('admin'); } };
  document.getElementById('admAddClient').onclick=()=>{ const name=prompt('Nome do novo ponto/cliente:'); if(!name) return; const days=clone(DEFAULT_DATA.clients[0].days).map(d=>({day:d.day,date:d.date,items:[]})); data.clients.push({id:makeId(name),name,point:name,defaultTime:'Horário a definir',days}); saveData(); render(); setTab('admin'); };
  document.getElementById('admExport').onclick=()=>{ const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='escala-osasco-express.json'; a.click(); URL.revokeObjectURL(a.href); };
  document.getElementById('admImport').onclick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=()=>{ const file=inp.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ try{ data=JSON.parse(r.result); saveData(); render(); setTab('admin'); }catch(e){ alert('JSON inválido'); } }; r.readAsText(file); }; inp.click(); };
  const sel=document.getElementById('admClientSelect');
  sel.onchange=()=>renderClientEditor(+sel.value);
  renderClientEditor(+sel.value);
}
function renderClientEditor(index){
  const c=data.clients[index];
  const host=document.getElementById('admClientEditor');
  host.innerHTML=`<div class="adminItem"><h4>Editar ponto</h4><div class="adminFields"><input class="input" id="edName" value="${esc(c.name)}"><input class="input" id="edPoint" value="${esc(c.point)}"><input class="input" id="edTime" value="${esc(c.defaultTime)}"><button class="btn danger" id="delClient">Remover ponto</button></div><button class="btn green full" id="saveClient">Salvar ponto</button></div>
  <div class="adminItem"><h4>Adicionar motoca/vaga</h4><div class="adminFields"><select id="addDay">${c.days.map((d,i)=>`<option value="${i}">${d.day} ${d.date}</option>`).join('')}</select><input class="input" id="addName" placeholder="Nome ou Vaga Aberta"><input class="input" id="addTime" placeholder="Horário específico (opcional)"><input class="input" id="addPoint" placeholder="Ponto específico (opcional)"><select id="addStatus"><option value="ok">Confirmado</option><option value="open">Vaga aberta</option></select><button class="btn red" id="addItem">Adicionar</button></div></div>
  <div class="adminList">${c.days.map((d,di)=>`<div class="adminItem"><h4>${d.day} · ${d.date}</h4><div class="adminList">${d.items.map((it,ii)=>renderAdminRow(index,di,ii,it)).join('') || '<p class="small">Sem agendamento informado.</p>'}</div></div>`).join('')}</div>`;
  document.getElementById('saveClient').onclick=()=>{ c.name=document.getElementById('edName').value; c.point=document.getElementById('edPoint').value; c.defaultTime=document.getElementById('edTime').value; saveData(); render(); setTab('admin'); };
  document.getElementById('delClient').onclick=()=>{ if(confirm('Remover este ponto?')){ data.clients.splice(index,1); saveData(); render(); setTab('admin'); } };
  document.getElementById('addItem').onclick=()=>{ const di=+document.getElementById('addDay').value; const item={name:document.getElementById('addName').value.trim()||'Vaga Aberta', time:document.getElementById('addTime').value.trim(), point:document.getElementById('addPoint').value.trim(), status:document.getElementById('addStatus').value}; if(item.status==='ok') delete item.status; if(!item.time) delete item.time; if(!item.point) delete item.point; c.days[di].items.push(item); saveData(); render(); setTab('admin'); };
  host.querySelectorAll('[data-rm]').forEach(btn=>btn.onclick=()=>{ const [ci,di,ii]=btn.dataset.rm.split('-').map(Number); data.clients[ci].days[di].items.splice(ii,1); saveData(); render(); setTab('admin'); });
  host.querySelectorAll('[data-save-row]').forEach(btn=>btn.onclick=()=>{ const [ci,di,ii]=btn.dataset.saveRow.split('-').map(Number); const prefix=`${ci}-${di}-${ii}`; const item=data.clients[ci].days[di].items[ii]; item.name=document.getElementById('n'+prefix).value; item.time=document.getElementById('t'+prefix).value; item.point=document.getElementById('p'+prefix).value; item.status=document.getElementById('s'+prefix).value; if(item.status==='ok') delete item.status; if(!item.time) delete item.time; if(!item.point) delete item.point; saveData(); render(); setTab('admin'); });
}
function renderAdminRow(ci,di,ii,it){
  const prefix=`${ci}-${di}-${ii}`;
  return `<div class="rowCard"><input class="input" id="n${prefix}" value="${esc(it.name||'')}"><input class="input" id="t${prefix}" value="${esc(it.time||'')}" placeholder="Horário"><input class="input" id="p${prefix}" value="${esc(it.point||'')}" placeholder="Ponto"><select id="s${prefix}"><option value="ok" ${itemStatus(it)==='ok'?'selected':''}>Confirmado</option><option value="open" ${itemStatus(it)==='open'?'selected':''}>Vaga aberta</option></select><button class="btn green" data-save-row="${prefix}">Salvar</button><button class="btn danger" data-rm="${prefix}">Remover</button></div>`;
}

// Swipe
let sx=0, sy=0;
document.getElementById('swipeArea').addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
document.getElementById('swipeArea').addEventListener('touchend',e=>{ const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy; if(Math.abs(dx)>48 && Math.abs(dx)>Math.abs(dy)) dx<0?next():prev(); },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight') next(); if(e.key==='ArrowLeft') prev(); if(e.key==='Escape') closeSheet(); });

function openMenu(tab='search'){ openSheet(tab); }
window.go=go; window.openMenu=openMenu; window.closeSheet=closeSheet;
render();
</script>
</body>
</html>
